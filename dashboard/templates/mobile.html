<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Automotion - Upload</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
        }
        .header h1 {
            font-size: 22px;
            color: #ff0040;
        }
        .header p {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }
        .upload-area {
            background: #1a1a2e;
            border: 2px dashed #2a2a4a;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:active {
            border-color: #ff0040;
            background: #16213e;
        }
        .upload-area .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .upload-area p {
            color: #888;
            font-size: 14px;
        }
        input[type="file"] {
            display: none;
        }
        .file-list {
            margin: 16px 0;
        }
        .file-item {
            background: #16213e;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-name {
            font-size: 13px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-size {
            font-size: 11px;
            color: #888;
            margin-left: 8px;
        }
        .file-status {
            font-size: 12px;
            margin-left: 8px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-upload {
            background: #00c853;
            color: #000;
        }
        .btn-upload:disabled {
            background: #333;
            color: #666;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #2a2a4a;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: #00c853;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
        .status-msg {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-top: 12px;
            display: none;
            font-size: 14px;
        }
        .status-success {
            background: rgba(0,200,83,0.15);
            color: #00c853;
        }
        .status-error {
            background: rgba(255,0,64,0.15);
            color: #ff0040;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .stat {
            background: #16213e;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }
        .stat h3 { font-size: 24px; }
        .stat p { font-size: 11px; color: #888; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>FB <span style="color:#e0e0e0;">Automotion</span></h1>
        <p>Upload gaming videos from iPhone</p>
    </div>

    <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <div class="icon">📱</div>
        <p><strong>Tap to select videos</strong></p>
        <p>MP4, MOV, AVI supported</p>
    </div>
    <input type="file" id="file-input" multiple accept="video/*">

    <div class="file-list" id="file-list"></div>

    <button class="btn btn-upload" id="upload-btn" disabled onclick="uploadFiles()">
        📤 Upload Videos
    </button>

    <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="status-msg" id="status-msg"></div>

    <div class="stats">
        <div class="stat">
            <h3 id="uploaded-count">0</h3>
            <p>Uploaded</p>
        </div>
        <div class="stat">
            <h3 id="queue-count">0</h3>
            <p>In Queue</p>
        </div>
    </div>

    <script>
    let selectedFiles = [];

    document.getElementById('file-input').addEventListener('change', function(e) {
        selectedFiles = Array.from(e.target.files);
        renderFileList();
    });

    function renderFileList() {
        const list = document.getElementById('file-list');
        const btn = document.getElementById('upload-btn');

        if (selectedFiles.length === 0) {
            list.innerHTML = '';
            btn.disabled = true;
            btn.textContent = '📤 Upload Videos';
            return;
        }

        btn.disabled = false;
        btn.textContent = `📤 Upload ${selectedFiles.length} Video${selectedFiles.length > 1 ? 's' : ''}`;

        list.innerHTML = selectedFiles.map((f, i) => `
            <div class="file-item" id="file-${i}">
                <span class="file-name">🎬 ${f.name}</span>
                <span class="file-size">${(f.size / 1024 / 1024).toFixed(1)} MB</span>
                <span class="file-status" id="status-${i}">⏳</span>
            </div>
        `).join('');
    }

    async function uploadFiles() {
        const btn = document.getElementById('upload-btn');
        const bar = document.getElementById('progress-bar');
        const fill = document.getElementById('progress-fill');
        btn.disabled = true;
        bar.style.display = 'block';

        let uploaded = 0;

        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            const statusEl = document.getElementById(`status-${i}`);
            statusEl.textContent = '⬆️';

            const formData = new FormData();
            formData.append('video', file);

            try {
                const res = await fetch('/api/upload/video', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.status === 'uploaded') {
                    statusEl.textContent = '✅';
                    uploaded++;
                } else {
                    statusEl.textContent = '❌';
                }
            } catch (err) {
                statusEl.textContent = '❌';
            }

            fill.style.width = ((i + 1) / selectedFiles.length * 100) + '%';
        }

        document.getElementById('uploaded-count').textContent = uploaded;
        showStatus(
            uploaded === selectedFiles.length
                ? `✅ ${uploaded} video${uploaded > 1 ? 's' : ''} uploaded!`
                : `⚠️ ${uploaded}/${selectedFiles.length} uploaded`,
            uploaded === selectedFiles.length ? 'success' : 'error'
        );

        btn.textContent = '✅ Done!';
        selectedFiles = [];
    }

    function showStatus(msg, type) {
        const el = document.getElementById('status-msg');
        el.textContent = msg;
        el.className = `status-msg status-${type}`;
        el.style.display = 'block';
    }
    </script>
</body>
</html>
