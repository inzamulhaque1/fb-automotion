name: Auto Post to Facebook

on:
  schedule:
    # 10 posts/day at Bangladesh peak hours (UTC = BDT - 6)
    # BDT 7:00  = UTC 1:00
    # BDT 9:00  = UTC 3:00
    # BDT 10:30 = UTC 4:30
    # BDT 12:00 = UTC 6:00
    # BDT 13:30 = UTC 7:30
    # BDT 15:00 = UTC 9:00
    # BDT 17:00 = UTC 11:00
    # BDT 19:00 = UTC 13:00
    # BDT 21:00 = UTC 15:00
    # BDT 22:00 = UTC 16:00
    - cron: '0 1 * * *'
    - cron: '0 3 * * *'
    - cron: '30 4 * * *'
    - cron: '0 6 * * *'
    - cron: '30 7 * * *'
    - cron: '0 9 * * *'
    - cron: '0 11 * * *'
    - cron: '0 13 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4

      - name: Run auto post
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PERSONAL_PAGE_ID: ${{ secrets.FB_PERSONAL_PAGE_ID }}
          FB_GAMING_PAGE_ID: ${{ secrets.FB_GAMING_PAGE_ID }}
        run: python auto_post.py
